<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador QR Azulito</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  text-align:center;
  font-family:Arial;
}

#reader{
  width:300px;
  margin:auto;
}

#estado{
  font-size:22px;
  margin-top:20px;
  height:30px;
}

</style>
</head>

<body>

<h2>Escáner QR</h2>

<div id="reader"></div>

<div id="estado"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyAOB8Fbl8nZH27okIGu1EeHr67ZIAGHYhk",
  authDomain: "contador-qr-azulito.firebaseapp.com",
  databaseURL: "https://contador-qr-azulito-default-rtdb.firebaseio.com",
  projectId: "contador-qr-azulito",
  storageBucket: "contador-qr-azulito.firebasestorage.app",
  messagingSenderId: "944409173492",
  appId: "1:944409173492:web:169ce004e6918bf64b6da1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const contadorRef = ref(db, "contador");

/* INCREMENTAR CONTADOR */

function incrementarContador(){
  runTransaction(contadorRef, (current)=>{
    return (current || 0) + 1;
  });
}

/* BLOQUEO ANTI DOBLE ESCANEO */

let bloqueoEscaneo = false;

/* ESCÁNER */

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(

  { facingMode: "environment" },

  {
    fps: 20,
    qrbox: { width: 220, height: 220 }
  },

  (decodedText)=>{

    if(bloqueoEscaneo) return;

    if(decodedText === "CONTADOR QR AZULITO"){

      incrementarContador();

      document.getElementById("estado").innerText = "QR válido ✅";

      if(navigator.vibrate){
        navigator.vibrate(200);
      }

      bloqueoEscaneo = true;

      setTimeout(()=>{
        bloqueoEscaneo = false;
        document.getElementById("estado").innerText = "";
      },5000);

    }

    else{

      document.getElementById("estado").innerText = "QR no válido ❌";

      bloqueoEscaneo = true;

      setTimeout(()=>{
        bloqueoEscaneo = false;
        document.getElementById("estado").innerText = "";
      },3000);

    }

  }

);

</script>

</body>
</html>
