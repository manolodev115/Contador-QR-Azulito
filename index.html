<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador QR Azulito</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  text-align:center;
  font-family:Arial;
}

/* AREA DE CAMARA MAS GRANDE */

#reader{
  width:500px;     /* antes 300px */
  margin:auto;
}

/* contador */

h1{
  font-size:50px;
}

</style>
</head>

<body>

<h2>Escáner QR</h2>

<div id="reader"></div>

<h1>Contador: <span id="contador">0</span></h1>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ============================= */
/* CONFIGURACIÓN FIREBASE */
/* ============================= */

const firebaseConfig = {
  apiKey: "AIzaSyAOB8Fbl8nZH27okIGu1EeHr67ZIAGHYhk",
  authDomain: "contador-qr-azulito.firebaseapp.com",
  databaseURL: "https://contador-qr-azulito-default-rtdb.firebaseio.com",
  projectId: "contador-qr-azulito",
  storageBucket: "contador-qr-azulito.firebasestorage.app",
  messagingSenderId: "944409173492",
  appId: "1:944409173492:web:169ce004e6918bf64b6da1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const contadorRef = ref(db, "contador");

/* ============================= */
/* MOSTRAR CONTADOR */
/* ============================= */

onValue(contadorRef, (snapshot) => {

  document.getElementById("contador").innerText = snapshot.val() || 0;

});

/* ============================= */
/* INCREMENTAR CONTADOR */
/* ============================= */

function incrementarContador(){

  runTransaction(contadorRef, (current) => {
    return (current || 0) + 1;
  });

}

/* ============================= */
/* BLOQUEO ANTI DOBLE ESCANEO */
/* ============================= */

let bloqueoEscaneo = false;

/* ============================= */
/* ESCÁNER QR */
/* ============================= */

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(

  { facingMode: "environment" }, // cámara trasera

  {
    fps: 25, // modo ultra rápido

    /* AREA DE ESCANEO MAS GRANDE */

    qrbox: {
      width: 320,
      height: 320
    }

  },

  (decodedText)=>{

    /* evitar escaneo doble */

    if(bloqueoEscaneo) return;

    if(decodedText === "CONTADOR QR AZULITO"){

      incrementarContador();

      bloqueoEscaneo = true;

      setTimeout(()=>{
        bloqueoEscaneo = false;
      },5000);

    }

  }

).catch(err=>{
  console.log(err);
});

</script>

</body>
</html>
